services:
  house-renewal-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: house-renewal-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/app.db
      UPLOAD_DIR: /app/uploads
      AUTH_SECRET: change-me-to-a-long-random-secret
      # Set to your public app URL (https:// or http://).
      APP_URL: https://your-domain.example
      MAX_UPLOAD_MB: 20
      SESSION_DAYS: 30
      # Optional override. If unset, cookie security is auto-resolved from
      # proxy headers (X-Forwarded-Proto / Forwarded), APP_URL scheme, then NODE_ENV.
      # SESSION_COOKIE_SECURE: "true"
      # Optional: only set when sharing cookies across subdomains.
      # SESSION_COOKIE_DOMAIN: .example.com
      # Optional diagnostic logging for auth/session flow.
      AUTH_DEBUG: "false"
    volumes:
      - house_renewal_data:/app/data
      - house_renewal_uploads:/app/uploads

volumes:
  house_renewal_data:
  house_renewal_uploads:
