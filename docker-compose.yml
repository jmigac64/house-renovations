services:
  house-renewal-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: house-renewal-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/app.db
      UPLOAD_DIR: /app/uploads
      AUTH_SECRET: change-me-to-a-long-random-secret
      # Set to your canonical public HTTPS hostname.
      APP_URL: https://app.example.com
      MAX_UPLOAD_MB: 20
      SESSION_DAYS: 30
      # Keep secure cookies enabled in production.
      SESSION_COOKIE_SECURE: "true"
      # Optional: only set when sharing cookies across subdomains (for example .example.com).
      # SESSION_COOKIE_DOMAIN: .example.com
      # Optional diagnostic logging for auth/session flow.
      AUTH_DEBUG: "false"
    volumes:
      - house_renewal_data:/app/data
      - house_renewal_uploads:/app/uploads

volumes:
  house_renewal_data:
  house_renewal_uploads:
